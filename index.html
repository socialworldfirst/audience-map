<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst Audience Map</title>
<style>

  :root {
    --bg: #f5f5f7;
    --panel: #ffffff;
    --panel-soft: #fafafb;
    --panel-tint: #f0f0f3;

    --ink: #1d1d1f;
    --ink-2: #424245;
    --ink-3: #6e6e73;
    --ink-4: #86868b;
    --ink-5: #a1a1a6;

    --line: #e5e5ea;
    --line-soft: #ececef;
    --line-strong: #d2d2d7;

    --imp:   #0071e3;  --imp-tint:   #e3eeff;
    --ecom:  #009688;  --ecom-tint:  #d9f0ee;
    --free:  #b8650f;  --free-tint:  #fae9d2;
    --buyer: #c0392b;  --buyer-tint: #fae0dc;
    --mute:  #8e8e93;  --mute-tint:  #ececef;

    --sidebar-w: 244px;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: #ffe066; }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
  }
  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* SIDEBAR */
  aside.sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 22px 18px 18px;
  }
  @media (max-width: 880px) {
    aside.sidebar {
      position: static;
      height: auto;
      border-right: 0;
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
    }
  }
  .brand {
    padding: 0 6px 18px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 18px;
  }
  .brand small {
    display: block;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-5);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .brand strong {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .nav-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-5);
    font-weight: 600;
    padding: 0 6px 8px;
  }
  nav.toc {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  nav.toc a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    color: var(--ink-3);
    text-decoration: none;
    font-size: 13px;
    transition: background .12s ease, color .12s ease;
    line-height: 1.3;
  }
  nav.toc a:hover {
    background: var(--panel-tint);
    color: var(--ink);
  }
  nav.toc a.active {
    background: var(--imp-tint);
    color: var(--imp);
  }
  nav.toc a.active .num { color: var(--imp); }
  nav.toc a .num {
    font-size: 11px;
    color: var(--ink-5);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    width: 18px;
    flex-shrink: 0;
  }
  .sidebar-foot {
    margin-top: auto;
    padding: 14px 6px 0;
    border-top: 1px solid var(--line-soft);
    font-size: 11px;
    color: var(--ink-5);
    line-height: 1.5;
  }
  .sidebar-foot a { color: var(--ink-3); text-decoration: none; }
  .sidebar-foot a:hover { color: var(--ink); }

  /* MAIN */
  main.main {
    padding: 32px 56px 80px;
    max-width: 1200px;
    width: 100%;
  }
  @media (max-width: 720px) {
    main.main { padding: 24px 20px 64px; }
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 14px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--line);
    font-size: 12px;
    color: var(--ink-4);
  }
  .topbar .crumbs span { color: var(--ink-3); }
  .topbar .crumbs span + span::before { content: " / "; color: var(--ink-5); }
  .topbar .meta-pills { display: flex; gap: 8px; }
  .meta-pill {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--ink-3);
  }
  .meta-pill b { color: var(--ink); font-weight: 600; }

  /* HERO */
  .hero {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .hero h1 {
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    font-weight: 600;
    margin: 0 0 8px;
  }
  .hero p.lede {
    font-size: 14.5px;
    color: var(--ink-3);
    margin: 0 0 20px;
    max-width: 680px;
  }

  /* STAT STRIP */
  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
  }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat b {
    display: block;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: -0.015em;
    margin-bottom: 3px;
    font-variant-numeric: tabular-nums;
  }
  .stat span {
    font-size: 11px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .stat.imp b   { color: var(--imp); }
  .stat.ecom b  { color: var(--ecom); }
  .stat.free b  { color: var(--free); }
  .stat.buyer b { color: var(--buyer); }

  /* SECTION */
  section.panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px 28px 28px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
    scroll-margin-top: 16px;
  }
  .panel-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding-bottom: 14px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--line-soft);
  }
  .panel-head .badge {
    font-size: 10.5px;
    color: var(--ink-5);
    background: var(--panel-tint);
    padding: 3px 7px;
    border-radius: 4px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .panel-head h2 {
    font-size: 19px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
    flex: 1;
  }
  .panel-head .head-meta {
    font-size: 11.5px;
    color: var(--ink-4);
  }
  .panel-sub {
    color: var(--ink-3);
    margin: 0 0 20px;
    font-size: 13.5px;
    max-width: 760px;
  }

  /* GRID HELPERS */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 1100px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  }

  /* CARD */
  .card {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 220px;
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .card:hover {
    border-color: var(--line-strong);
  }
  .card .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .swatch {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .sw-imp { background: var(--imp); }
  .sw-ecom { background: var(--ecom); }
  .sw-free { background: var(--free); }
  .sw-buyer { background: var(--buyer); }
  .sw-mute { background: var(--mute); }

  .tag {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--ink-4);
  }
  .tag.imp { color: var(--imp); }
  .tag.ecom { color: var(--ecom); }
  .tag.free { color: var(--free); }
  .tag.buyer { color: var(--buyer); }
  .tag.mute { color: var(--mute); }

  .card .name {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .card .essence {
    font-size: 13px;
    color: var(--ink-3);
    margin: 0;
  }
  .card .essence strong { color: var(--ink-2); font-weight: 600; }
  .card .need {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--line-soft);
    font-size: 12.5px;
    color: var(--ink-2);
  }
  .card .need .lbl {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-5);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .card.muted {
    background: repeating-linear-gradient(45deg, #fafafb, #fafafb 6px, #f5f5f7 6px, #f5f5f7 12px);
    border-style: solid;
    border-color: var(--line-strong);
  }
  .card.muted .name { color: var(--ink-2); }

  /* WARN BANNER */
  .warn {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 12px 14px;
    background: #fff6df;
    border: 1px solid #f1d986;
    border-radius: 6px;
    font-size: 12.5px;
    color: #5b4310;
    margin-bottom: 14px;
  }
  .warn .icon {
    font-weight: 700;
    color: #b87a13;
    flex-shrink: 0;
  }
  .warn strong { color: #3d2c0a; }

  /* FUNNEL */
  .funnel-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 20px;
    align-items: center;
    padding: 12px 0;
    border-top: 1px solid var(--line-soft);
  }
  .funnel-row:first-of-type { border-top: 0; padding-top: 0; }
  .funnel-row .stage {
    font-size: 12.5px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .track {
    position: relative;
    height: 26px;
    background: var(--panel-tint);
    border-radius: 4px;
  }
  .track .bar {
    position: absolute;
    top: 3px;
    height: 20px;
    border-radius: 3px;
    color: white;
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    padding: 0 9px;
    white-space: nowrap;
    letter-spacing: -0.005em;
  }
  .b-imp { background: var(--imp); }
  .b-ecom { background: var(--ecom); }
  .b-free { background: var(--free); }
  .b-buyer { background: var(--buyer); }
  .axis {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 20px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line-soft);
  }
  .axis .labels {
    display: flex;
    justify-content: space-between;
    font-size: 10.5px;
    color: var(--ink-5);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* OVERLAP */
  .overlap-grid {
    display: grid;
    grid-template-columns: 5fr 4fr;
    gap: 16px;
  }
  @media (max-width: 880px) { .overlap-grid { grid-template-columns: 1fr; } }
  .venn-panel {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 320px;
  }
  .notes-panel {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .notes-panel h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-4);
    margin: 0 0 8px;
    font-weight: 600;
  }
  .notes-panel ul {
    margin: 0 0 14px;
    padding: 0;
    list-style: none;
  }
  .notes-panel ul li {
    padding: 7px 0;
    border-top: 1px solid var(--line-soft);
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .notes-panel ul li:first-child { border-top: 0; }
  .notes-panel ul li strong { color: var(--ink); font-weight: 600; }

  /* MATRIX */
  .matrix {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    overflow: hidden;
  }
  .matrix table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .matrix th, .matrix td {
    text-align: left;
    padding: 11px 14px;
    border-bottom: 1px solid var(--line-soft);
    vertical-align: middle;
  }
  .matrix tbody tr:last-child td { border-bottom: 0; }
  .matrix tbody tr:hover td { background: rgba(0,0,0,0.015); }
  .matrix th {
    font-weight: 500;
    color: var(--ink-4);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--panel-tint);
  }
  .matrix td.label {
    font-weight: 500;
    color: var(--ink);
  }
  .matrix td.note {
    color: var(--ink-3);
    font-size: 12.5px;
  }

  .fit { display: inline-flex; gap: 3px; align-items: center; }
  .fit .d { width: 6px; height: 6px; border-radius: 50%; background: var(--line-strong); }
  .fit.h .d:nth-child(1), .fit.h .d:nth-child(2), .fit.h .d:nth-child(3) { background: var(--ink); }
  .fit.m .d:nth-child(1), .fit.m .d:nth-child(2) { background: var(--ink); }
  .fit.l .d:nth-child(1) { background: var(--ink); }
  .fit.x .d { background: transparent; border: 1px solid var(--line-strong); width: 4px; height: 4px; }

  .legend {
    margin-top: 12px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--ink-4);
  }
  .legend > span { display: inline-flex; align-items: center; gap: 7px; }

  /* FRAMING */
  .framing { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 800px) { .framing { grid-template-columns: 1fr; } }
  .frame {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 22px 24px;
    border-top: 3px solid;
  }
  .frame.west { border-top-color: var(--imp); }
  .frame.dev { border-top-color: var(--free); }
  .frame .badge {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 3px;
    margin-bottom: 12px;
  }
  .frame.west .badge { background: var(--imp-tint); color: var(--imp); }
  .frame.dev .badge { background: var(--free-tint); color: var(--free); }
  .frame h3 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .frame .geo {
    font-size: 12px;
    color: var(--ink-4);
    margin: 0 0 14px;
  }
  .frame blockquote {
    margin: 0 0 14px;
    padding: 12px 14px;
    background: var(--panel);
    border-left: 2px solid var(--line-strong);
    border-radius: 4px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.45;
    font-style: italic;
  }
  .frame ul {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .frame ul li {
    padding: 7px 0;
    border-top: 1px solid var(--line-soft);
    font-size: 12.5px;
    color: var(--ink-2);
  }
  .frame ul li:first-child { border-top: 0; }
  .frame ul li strong { color: var(--ink); font-weight: 600; }

  /* PRODUCT HOOKS */
  .hook {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 130px;
  }
  .hook .name { font-size: 13.5px; font-weight: 600; }
  .hook .what { font-size: 12px; color: var(--ink-3); line-height: 1.45; }
  .hook .pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; }
  .pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 600;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .pill-imp   { color: var(--imp);   border-color: var(--imp-tint);   background: var(--imp-tint); }
  .pill-ecom  { color: var(--ecom);  border-color: var(--ecom-tint);  background: var(--ecom-tint); }
  .pill-free  { color: var(--free);  border-color: var(--free-tint);  background: var(--free-tint); }
  .pill-buyer { color: var(--buyer); border-color: var(--buyer-tint); background: var(--buyer-tint); }
  .pill.primary::before { content: "★ "; }
  .pill.weak { opacity: 0.55; }

  /* GTM */
  .gtm {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .gtm .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 5px;
  }
  .gtm .title { font-size: 13.5px; font-weight: 600; }
  .gtm .meta { font-size: 10.5px; color: var(--ink-4); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .gtm .desc { font-size: 12.5px; color: var(--ink-3); margin-bottom: 9px; line-height: 1.5; }
  .gtm .pills { display: flex; flex-wrap: wrap; gap: 4px; }

  /* CSM */
  .csm-card {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    overflow: hidden;
  }
  .csm-card .head {
    background: var(--panel);
    padding: 18px 22px;
    border-bottom: 1px solid var(--line-soft);
    border-left: 3px solid var(--free);
  }
  .csm-card .head .badge {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-weight: 600;
    padding: 3px 8px;
    background: var(--free-tint);
    color: var(--free);
    border-radius: 3px;
    margin-bottom: 8px;
  }
  .csm-card .head h3 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 5px;
    letter-spacing: -0.01em;
  }
  .csm-card .head p { margin: 0; color: var(--ink-3); font-size: 13px; }
  .csm-card .body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    padding: 20px 22px;
  }
  @media (max-width: 800px) { .csm-card .body { grid-template-columns: 1fr; } }
  .csm-card h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-4);
    margin: 0 0 8px;
    font-weight: 600;
  }
  .csm-card ul { margin: 0; padding: 0; list-style: none; }
  .csm-card ul li {
    padding: 7px 0;
    border-top: 1px solid var(--line-soft);
    font-size: 13px;
    color: var(--ink-2);
  }
  .csm-card ul li:first-child { border-top: 0; }
  .csm-card ul li strong { color: var(--ink); font-weight: 600; }
  .csm-card .strategic {
    grid-column: 1 / -1;
    margin-top: 0;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--ink-2);
  }
  .csm-card .strategic strong { color: var(--ink); }

  /* PROFILES */
  .profile {
    background: var(--panel-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    padding: 22px 24px;
    margin-bottom: 14px;
    border-left: 3px solid var(--line-strong);
  }
  .profile.imp   { border-left-color: var(--imp); }
  .profile.ecom  { border-left-color: var(--ecom); }
  .profile.free  { border-left-color: var(--free); }
  .profile.buyer { border-left-color: var(--buyer); }
  .profile.muted {
    background: repeating-linear-gradient(45deg, var(--panel-soft), var(--panel-soft) 6px, var(--bg) 6px, var(--bg) 12px);
    border-left-color: var(--mute);
  }
  .profile-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line-soft);
  }
  .profile-head .left { display: flex; align-items: center; gap: 10px; }
  .profile-head h3 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .profile-head .id {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    background: var(--panel);
    border: 1px solid var(--line-soft);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .status {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 3px;
  }
  .status.primary    { background: var(--imp); color: white; }
  .status.best       { background: var(--ecom); color: white; }
  .status.experiment { background: var(--free); color: white; }
  .status.high-intent { background: var(--buyer); color: white; }
  .status.potential  { background: var(--mute-tint); color: var(--ink-2); border: 1px solid var(--line-strong); }

  .pbody {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }
  @media (max-width: 760px) { .pbody { grid-template-columns: 1fr; } }
  .pblock h4 {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--ink-4);
    margin: 0 0 5px;
    font-weight: 600;
  }
  .pblock p { margin: 0 0 12px; font-size: 13px; color: var(--ink-2); line-height: 1.55; }
  .pblock ul { margin: 0 0 12px; padding-left: 16px; font-size: 13px; color: var(--ink-2); }
  .pblock ul li { margin-bottom: 3px; }
  .keywords {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 10.5px;
    background: var(--panel);
    border: 1px solid var(--line-soft);
    padding: 9px 11px;
    border-radius: 5px;
    line-height: 1.85;
    color: var(--ink-2);
  }
  .keywords code {
    background: var(--panel-tint);
    padding: 1px 6px;
    border-radius: 3px;
    margin: 0 2px 2px 0;
    display: inline-block;
  }

  footer.foot {
    border-top: 1px solid var(--line);
    margin-top: 40px;
    padding-top: 20px;
    color: var(--ink-4);
    font-size: 12px;
    line-height: 1.7;
  }
  footer.foot code {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    background: var(--panel);
    border: 1px solid var(--line-soft);
    padding: 1px 5px;
    border-radius: 3px;
  }


/* Gate */
body.locked { overflow: hidden; }
body.locked #content > * { filter: blur(20px); pointer-events: none; user-select: none; }
#gate {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(245, 245, 247, 0.78);
  -webkit-backdrop-filter: saturate(180%) blur(10px);
  backdrop-filter: saturate(180%) blur(10px);
  z-index: 9999;
}
#gate-card {
  background: #fff;
  border: 1px solid #e5e5ea;
  border-radius: 12px;
  padding: 28px 30px;
  width: 320px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
}
#gate-card .lbl {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #86868b;
  font-weight: 600;
  margin-bottom: 6px;
}
#gate-card h2 {
  font-size: 18px;
  font-weight: 600;
  margin: 0 0 18px;
  letter-spacing: -0.01em;
  color: #1d1d1f;
}
#gate-form {
  display: flex; gap: 8px;
}
#gate-input {
  flex: 1;
  padding: 10px 12px;
  font-size: 14px;
  border: 1px solid #d2d2d7;
  border-radius: 6px;
  outline: none;
  background: #fff;
  color: #1d1d1f;
  font-family: inherit;
  -webkit-appearance: none;
}
#gate-input:focus {
  border-color: #0071e3;
  box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
}
#gate-btn {
  padding: 10px 16px;
  font-size: 13.5px;
  font-weight: 500;
  background: #1d1d1f;
  color: #fff;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
}
#gate-btn:hover { background: #424245; }
#gate-err {
  font-size: 12px;
  color: #c0392b;
  margin-top: 10px;
  min-height: 16px;
}
</style>

<script>
const LS_KEY = "audience_map_pw";

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false, ["decrypt"]
  );
}

async function decryptPayload(password) {
  const blob = JSON.parse(document.getElementById('payload').textContent);
  const salt = b64ToBytes(blob.salt);
  const iv = b64ToBytes(blob.iv);
  const ct = b64ToBytes(blob.ciphertext);
  const key = await deriveKey(password, salt, blob.iterations);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}

function execInjectedScripts(container) {
  const scripts = container.querySelectorAll('script');
  scripts.forEach(oldScript => {
    const newScript = document.createElement('script');
    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
    newScript.textContent = oldScript.textContent;
    oldScript.parentNode.replaceChild(newScript, oldScript);
  });
}

function unlock(html) {
  const content = document.getElementById('content');
  content.innerHTML = html;
  execInjectedScripts(content);
  document.getElementById('gate').style.display = 'none';
  document.body.classList.remove('locked');
}

async function gateSubmit(e) {
  e.preventDefault();
  const inp = document.getElementById('gate-input');
  const err = document.getElementById('gate-err');
  err.textContent = '';
  try {
    const html = await decryptPayload(inp.value);
    unlock(html);
    try { localStorage.setItem(LS_KEY, inp.value); } catch (_) {}
  } catch (ex) {
    err.textContent = 'wrong password';
    inp.value = '';
    inp.focus();
  }
  return false;
}

(async () => {
  try {
    const cached = localStorage.getItem(LS_KEY);
    if (cached) {
      const html = await decryptPayload(cached);
      unlock(html);
    }
  } catch (_) {
    try { localStorage.removeItem(LS_KEY); } catch (_) {}
  }
})();
</script>
</body>
